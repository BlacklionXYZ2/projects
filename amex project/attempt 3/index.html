<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Notification Model</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.cdnfonts.com/css/sf-pro-display"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- partial:index.partial.html -->
    <h2 class="mainHeading">Notification Preview</h2>
    <table>
      <tr>
        <td>
          <div class="input">
            <p type="text" placeholder="Title" class="title"></p>
            <p
              type="text"
              placeholder="Type notification here"
              class="text"
            ></p>
          </div>
          <button class="enter">Enter</button>
        </td>

        <!-- <button type="button" class="darkMode">off</button> -->
        <td class="visual out">
          <div class="visual in">
            <div class="ios">
              <img class="iphone" src="iphone.png" alt="" />
              <div class="iosNotif">
                <div class="iosIcon">
                  <img class="iosIcon" src="amex_logo_ios.png" alt="" />
                </div>
                <div class="text1">
                  <h2 id="adtitleLive" class="iosTitle"></h2>
                  <p id="AdContentLive" class="iosCont"></p>
                </div>
              </div>
            </div>
            <div class="android">
              <img class="s23" src="android.png" alt="" />
              <div class="androidNotif">
                <div class="andIcon">
                  <div class="icnAlign">
                    <img class="andIcon" src="amex_logo_android.png" alt="" />
                    <p class="iconText">American Express</p>
                  </div>
                </div>
                <div class="text2">
                  <h2 id="adtitleLive2" class="anTitle"></h2>
                  <p id="AdContentLive2" class="anCont"></p>
                </div>
              </div>
            </div>
          </div>
        </td>
      </tr>
    </table>
    <!-- partial -->
    <script src="script.js"></script>
  </body>
</html>
