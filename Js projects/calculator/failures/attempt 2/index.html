<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <p class="output"></p>
  <table id="numbers">
    <button id="1" class="num">1</button>
    <button id="2" class="num">2</button>
    <button id="3" class="num">3</button>
    <button id="4" class="num">4</button>
    <button id="5" class="num">5</button>
    <button id="6" class="num">6</button>
    <button id="7" class="num">7</button>
    <button id="8" class="num">8</button>
    <button id="9" class="num">9</button>
    <button id="0" class="num">0</button>
    <td>
      <button id="+" class="operator" onclick="add()">+</button>
      <button id="-" class="operator" onclick="subtract()">-</button>
      <button id="x" class="operator" onclick="multiply()">x</button>
      <button id="/" class="operator" onclick="divide()">/</button>
    </td>
    <table id="table">
      <button id="Enter" onclick="enter()">Enter</button>
    </table>
  </table>
  <source src="script.js" />
</body>
