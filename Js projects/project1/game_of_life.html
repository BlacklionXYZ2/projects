<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>project1</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/p5.js"></script>
    <script src="js/addons/p5.sound.min.js"></script>
  </head>
  <body>
    <script>
      function make2DArray(columns, rows) {
        let arr = Array(columns);
        for (let x = 0; x < arr.length; x++) {
          arr[x] = Array(rows);
        }
        return arr;
      }

      function count_neighbours(grid, x, y) {
        let sum = 0;
        for (let rel_x = -1; rel_x < 2; rel_x++) {
          for (let rel_y = -1; rel_y < 2; rel_y++) {
            let col = (x + rel_x + columns) % columns;
            let row = (y + rel_y + rows) % rows;
            sum += grid[col][row];
          }
        }
        sum -= grid[x][y];
        return sum;
      }

      let screen_width = 850;
      let screen_height = 400;
      let grid;
      let new_grid;
      let columns = 10;
      let rows = 10;
      let resolution = 25 / 4;

      function setup() {
        createCanvas(screen_width, screen_height);
        columns = screen_width / resolution;
        rows = screen_height / resolution;
        grid = make2DArray(columns, rows);
        for (let x = 0; x < grid.length; x++) {
          for (let y = 0; y < grid[x].length; y++) {
            grid[x][y] = floor(random(2));
          }
        }
      }

      function draw() {
        background(0);

        for (let x = 0; x < grid.length; x++) {
          for (let y = 0; y < grid[x].length; y++) {
            let x_pos = x * resolution;
            let y_pos = y * resolution;
            if (grid[x][y] == 1) {
              fill(255);
              rect(x_pos, y_pos, resolution - 1, resolution - 1);
            }

            let new_grid = make2DArray(columns, rows);

            for (let x = 0; x < grid.length; x++) {
              for (let y = 0; y < grid[x].length; y++) {
                let state = grid[x][y];
                let sum = 0;
                let neighbours = count_neighbours(grid, x, y);

                if (state == 0 && neighbours == 3) {
                  new_grid[x][y] = 1;
                } else if (state == 1 && (neighbours < 2 || neighbours > 3)) {
                  new_grid[x][y] = 0;
                } else {
                  new_grid[x][y] = state;
                }
              }
            }
          }
        }
      }
    </script>
  </body>
</html>
